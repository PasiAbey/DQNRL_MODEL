name: Nightly Model Retraining

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually via a button

# NEW: Explicitly grant the bot permission to push the .pth file back to the repo
permissions:
  contents: write 

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch training script
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: python train.py

      - name: Commit and push updated model
        run: |
          git config --global user.name "Skill-Quest MLOps Bot"
          git config --global user.email "mlops@skillquest.bot"
          git add trained_rl_agent.pth
          git commit -m "Auto-update: Nightly RL model retrain" || echo "No new experiences to train on"
          git push